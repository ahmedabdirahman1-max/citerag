<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CiteRAG — grounded document Q&A</title>
<style>
  :root { --bg:#0f1320; --card:#181d2e; --line:#2a3147; --txt:#e7ebf5;
          --muted:#9aa4be; --accent:#5b8cff; --good:#3ecf8e; --warn:#f0b24b; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  .wrap { max-width:780px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .badge { font-size:11px; color:var(--good); border:1px solid var(--good);
           border-radius:6px; padding:1px 6px; margin-left:6px; vertical-align:middle; }
  .sub { color:var(--muted); margin:0 0 22px; }
  .row { display:flex; gap:8px; }
  input { flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
          background:var(--card); color:var(--txt); font-size:15px; }
  button { padding:12px 18px; border:0; border-radius:10px; background:var(--accent);
           color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .chips { margin:14px 0 4px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { font-size:13px; color:var(--muted); border:1px solid var(--line);
          background:transparent; padding:6px 10px; border-radius:999px; cursor:pointer; }
  .chip:hover { color:var(--txt); border-color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:18px; margin-top:18px; }
  .answer { font-size:17px; }
  .answer.refused { color:var(--warn); }
  .meta { color:var(--muted); font-size:12.5px; margin-top:8px; }
  .src-h { color:var(--muted); font-size:12px; text-transform:uppercase;
           letter-spacing:.04em; margin:16px 0 8px; }
  .src { border-left:2px solid var(--accent); padding:6px 0 6px 12px; margin:10px 0; }
  .src .t { font-size:13px; color:var(--txt); }
  .src .d { font-size:12px; color:var(--muted); margin-top:2px; }
  .pill { display:inline-block; font-size:11px; color:var(--accent);
          border:1px solid var(--line); border-radius:6px; padding:0 6px; margin-right:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CiteRAG <span class="badge">demo</span></h1>
  <p class="sub">Ask about Acme's policies. Every answer cites the exact source — and it
     says "I couldn't find that" instead of guessing when the answer isn't in the docs.</p>

  <div class="row">
    <input id="q" placeholder="e.g. Is there a restocking fee on returns?" autofocus />
    <button id="go">Ask</button>
  </div>
  <div class="chips" id="chips"></div>
  <div id="out"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

async function loadSamples(){
  try {
    const { samples } = await (await fetch('/api/samples')).json();
    $('chips').innerHTML = samples.map(s => `<button class="chip">${esc(s)}</button>`).join('');
    document.querySelectorAll('.chip').forEach(c =>
      c.addEventListener('click', () => { $('q').value = c.textContent; ask(); }));
  } catch(e){}
}

function renderSources(sources){
  if(!sources || !sources.length) return '';
  const items = sources.map(s => `<div class="src">
      <div class="t"><span class="pill">[${s.n}]</span>${esc(s.snippet)}</div>
      <div class="d">${esc(s.doc)} — ${esc(s.section)} · score ${s.score}</div>
    </div>`).join('');
  return `<div class="src-h">Sources</div>${items}`;
}

function render(res){
  if(res.error){ $('out').innerHTML = `<div class="card">${esc(res.error)}</div>`; return; }
  $('out').innerHTML = `<div class="card">
      <div class="answer${res.refused?' refused':''}">${esc(res.answer)}</div>
      <div class="meta">${res.refused?'refused (no supporting source)':'mode: '+esc(res.mode)} · top match ${res.top_score}</div>
      ${renderSources(res.sources)}
    </div>`;
}

async function ask(){
  const question = $('q').value.trim();
  if(!question) return;
  $('go').disabled = true;
  $('out').innerHTML = `<div class="card meta">Searching the documents…</div>`;
  try {
    const r = await fetch('/api/ask', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question })
    });
    render(await r.json());
  } catch(e){
    $('out').innerHTML = `<div class="card">Request failed: ${esc(e.message)}</div>`;
  } finally { $('go').disabled = false; }
}

$('go').addEventListener('click', ask);
$('q').addEventListener('keydown', e => { if(e.key==='Enter') ask(); });
loadSamples();
</script>
</body>
</html>
